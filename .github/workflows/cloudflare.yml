name: Clouflare Worker

concurrency:
  cancel-in-progress: false
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  BUN_VERSION: latest
  NEXT_TELEMTRY_DISABLED: 1
  NODE_VERSION: 24
  STAGE: ${{ github.event.inputs.environment || 'preview' }}

on:
  repository_dispatch:
    types: [cf-deploy, preview, production]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment would you like to deploy to?'
        required: true
        default: preview
        type: environment

permissions:
  contents: read
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      STAGE: ${{ inputs.environment || 'preview' }}
    outputs:
      environment: ${{ steps.publish.outputs.pages-environment }}
      url: ${{ steps.publish.outputs.deployment-url }}
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Setup the Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          # Generate a new cache whenever packages or source files change.
          key: bun-${{ runner.os }}-${{ hashFiles('**/*.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            bun-${{ runner.os }}-${{ hashFiles('**/*.lock') }}-
      - id: publish
        name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: ${{ env.STAGE }}
          command: bun run deploy
